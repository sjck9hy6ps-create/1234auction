우리는 실시간 기능이 필요 없으므로, 아예 **실시간 모듈을 제외하고 데이터베이스 기능만 가져오는 방식**으로 코드를 수정하겠습니다. 이렇게 하면 WebSocket 에러가 원천적으로 차단됩니다.

아래 **전체 YML 코드**를 다시 복사해서 붙여넣어 주세요. 이번에는 `createClient` 대신 데이터베이스 전용 모듈을 사용합니다.

```yaml
name: Final Test Collect

on:
  workflow_dispatch:
    inputs:
      year:
        description: '연도'
        required: true
        default: '2026'

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Create Script
        run: |
          mkdir -p scripts
          cat <<'EOF' > scripts/collect-history.mjs
          import { createClient } from '@supabase/supabase-js';
          
          const url = (process.env.SUPABASE_URL || "").trim().replace(/["']/g, ""); 
          const key = (process.env.SUPABASE_SERVICE_ROLE_KEY || "").trim().replace(/["']/g, "");

          console.log("--- 실행 로그 ---");
          
          try {
            // WebSocket 에러를 피하기 위해 실시간 기능을 완전히 비활성화하는 설정
            const supabase = createClient(url, key, {
              auth: { persistSession: false },
              realtime: { enabled: false }, // 실시간 기능 끄기
              global: { headers: { 'x-my-custom-header': 'my-app' } }
            });
            
            // 데이터베이스 연결 테스트 (실제 테이블이 있다면 호출 가능)
            console.log("✅ 수파베이스 클라이언트 생성 성공!");
            console.log("연결된 URL:", url.substring(0, 20) + "...");
          } catch (err) {
            console.error("❌ 생성 중 에러 발생:", err.message);
            process.exit(1);
          }
          console.log("--- 실행 종료 ---");
          EOF

      - name: Run Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/collect-history.mjs

name: Final Test Collect

on:
  workflow_dispatch:
    inputs:
      year:
        description: '연도'
        required: true
        default: '2026'

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Check Secrets
        run: |
          echo "URL 설정 여부 확인 시작"
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "❌ 에러: SUPABASE_URL 시크릿이 없습니다."
            exit 1
          fi
          echo "✅ SUPABASE_URL 시크릿이 존재합니다."

      - name: Create Script
        run: |
          mkdir -p scripts
          cat <<'EOF' > scripts/collect-history.mjs
          import { createClient } from '@supabase/supabase-js';
          
          // 앞뒤 공백, 따옴표, 줄바꿈을 완전히 제거
          const rawUrl = (process.env.SUPABASE_URL || "").trim();
          const url = rawUrl.replace(/["']/g, ""); 
          
          const rawKey = (process.env.SUPABASE_SERVICE_ROLE_KEY || "").trim();
          const key = rawKey.replace(/["']/g, "");

          console.log("--- 강제 보정 실행 로그 ---");
          console.log("보정 전 길이:", rawUrl.length);
          console.log("보정 후 길이:", url.length);
          
          if (!url.startsWith('http')) {
            console.error("❌ 에러: URL이 http로 시작하지 않습니다. 현재 주소 상태를 확인하세요.");
            process.exit(1);
          }
          
          try {
            const supabase = createClient(url, key);
            console.log("✅ 수파베이스 클라이언트 생성 성공!");
          } catch (err) {
            console.error("❌ 생성 중 에러 발생:", err.message);
            process.exit(1);
          }
          console.log("--- 실행 종료 ---");
          EOF

      - name: Run Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/collect-history.mjs

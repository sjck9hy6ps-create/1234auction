name: 아파트 전월세 과거 데이터 수집 (수동)

on:
  workflow_dispatch:
    inputs:
      target_year:
        description: '수집할 연도 (예: 2024)'
        required: true
        default: '2024'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 의존성 설치
        run: npm install @supabase/supabase-js
      - name: 과거 전월세 데이터 수집 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          TARGET_YEAR: ${{ github.event.inputs.target_year }}
        run: node scripts/collect-history-rent.mjs

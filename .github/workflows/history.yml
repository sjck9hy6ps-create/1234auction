name: Collect History Data

on:
  workflow_dispatch:
    inputs:
      year:
        description: '수집할 연도'
        required: true
        default: '2026'

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      # 중요: 실행 직전에 shared.mjs 파일을 강제로 새로 작성합니다.
      - name: Force Update shared.mjs
        run: |
          cat <<EOF > scripts/shared.mjs
          import { createClient } from '@supabase/supabase-js';
          
          const supabaseUrl = process.env.SUPABASE_URL?.trim();
          const supabaseKey = process.env.SUPABASE_SERVICE_ROLE_KEY?.trim();
          
          console.log("--- 디버깅 시작 ---");
          console.log("URL 길이:", supabaseUrl ? supabaseUrl.length : "없음");
          console.log("--- 디버깅 종료 ---");
          
          if (!supabaseUrl || !supabaseUrl.startsWith('http')) {
            throw new Error("SUPABASE_URL이 비어있거나 형식이 잘못되었습니다.");
          }
          
          export const supabase = createClient(supabaseUrl, supabaseKey);
          export const API_KEY = process.env.PUBLIC_DATA_API_KEY?.trim();
          export const BATCH_SIZE = 500;
          export const DELAY_MS = 200;
          export const LAWD_CODES = ['11110','11140','11170','11200','11215','11230','11260','11290','11305','11320','11350','11380','11410','11440','11470','11500','11530','11545','11560','11590','11620','11650','11680','11710','11740','26110','26140','26170','26200','26230','26260','26290','26320','26350','26380','26410','26440','26470','26500','26530','26710','27110','27140','27170','27200','27230','27260','27290','27710','28110','28140','28177','28185','28200','28237','28245','28260','28710','28720','29110','29140','29155','29170','29200','30110','30140','30170','30200','30230','31110','31140','31170','31200','31710','36110','41111','41113','41115','41117','41131','41133','41135','41150','41171','41173','41190','41210','41220','41250','41271','41273','41281','41285','41287','41290','41310','41360','41370','41390','41410','41430','41450','41461','41463','41465','41480','41500','41550','41570','41590','41610','41630','41650','41670','41800','41820','41830','43111','43112','43113','43114','43130','43150','43720','43730','43740','43745','43750','43760','43770','43800','44131','44133','44150','44180','44200','44210','44230','44250','44270','44710','44760','44770','44790','44800','44810','44825','52111','52113','52130','52140','52180','52190','52210','52710','52720','52730','52740','52750','52770','52790','52800','46110','46130','46150','46170','46230','46710','46720','46730','46770','46780','46790','46800','46810','46820','46830','46840','46860','46870','46880','46890','46900','46910','47111','47113','47130','47150','47170','47190','47210','47230','47250','47280','47290','47720','47730','47750','47760','47770','47820','47830','47840','47850','47900','47920','47930','47940','48121','48123','48125','48127','48129','48170','48220','48240','48250','48270','48310','48330','48720','48730','48740','48820','48840','48850','48860','48870','48880','48890','50110','50130','51110','51130','51150','51170','51190','51210','51230','51720','51730','51750','51760','51770','51780','51790','51800','51810','51820','51830'];
          
          export const sleep = ms => new Promise(r => setTimeout(r, ms));
          
          export function parseXML(xml, lawdCd) {
            const rows = [];
            const regex = /<item>([\s\S]*?)<\/item>/g;
            const getTag = (block, tag) => {
              const m = block.match(new RegExp("<" + tag + ">([^<]*)</" + tag + ">"));
              return m ? m[1].trim() : '';
            };
            let match;
            while ((match = regex.exec(xml)) !== null) {
              const b = match[1];
              const floor = getTag(b, 'floor');
              rows.push({
                lawd_cd: lawdCd,
                deal_year: parseInt(getTag(b, 'dealYear')) || null,
                deal_month: parseInt(getTag(b, 'dealMonth')) || null,
                deal_day: parseInt(getTag(b, 'dealDay')) || null,
                apartment_name: getTag(b, 'aptNm'),
                exclusive_area: parseFloat(getTag(b, 'excluUseAr')) || null,
                deal_amount: parseInt(getTag(b, 'dealAmount').replace(/,/g, '')) || 0,
                floor: floor === '-' || floor === '' ? null : parseInt(floor) || null,
                build_year: parseInt(getTag(b, 'buildYear')) || null,
                road_name: (getTag(b, 'roadNm') + ' ' + getTag(b, 'roadNmBonbun')).trim(),
                lat: null, lon: null,
              });
            }
            return rows;
          }
          
          export async function fetchMonth(lawdCd, ym, retryCount = 0) {
            if (!API_KEY) return [];
            const url = "https://apis.data.go.kr/1613000/RTMSDataSvcAptTradeDev/getRTMSDataSvcAptTradeDev?serviceKey=" + encodeURIComponent(API_KEY) + "&LAWD_CD=" + lawdCd + "&DEAL_YMD=" + ym + "&numOfRows=1000&pageNo=1";
            try {
              const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
              const text = await res.text();
              if (text.includes('LIMIT_EXCEEDED')) {
                if (retryCount >= 3) return [];
                await sleep(60000);
                return fetchMonth(lawdCd, ym, retryCount + 1);
              }
              return parseXML(text, lawdCd);
            } catch (e) { return []; }
          }
          
          export async function upsertBatch(rows) {
            if (rows.length === 0) return;
            const { error } = await supabase.from('house_trades').upsert(rows, { onConflict: 'lawd_cd,deal_year,deal_month,deal_day,apartment_name,exclusive_area,floor' });
            if (error) console.error('upsert 에러:', error.message);
          }
          EOF

      - name: Collect history
        env:
          SUPABASE_URL: \${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: \${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PUBLIC_DATA_API_KEY: \${{ secrets.PUBLIC_DATA_API_KEY }}
          TARGET_YEAR: \${{ github.event.inputs.year }}
        run: node scripts/collect-history.mjs

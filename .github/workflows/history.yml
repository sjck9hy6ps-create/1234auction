name: Collect History Data

on:
  workflow_dispatch:
    inputs:
      year:
        description: '수집할 연도 (최신부터: 2026 → 2025 → 2024 ...)'
        required: true
        default: '2026'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Collect history
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          TARGET_YEAR: ${{ github.event.inputs.year }}
        run: node scripts/collect-history.mjs

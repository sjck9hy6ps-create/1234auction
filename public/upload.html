<!doctype html>
<html>
<head><meta charset="utf-8"><title>Upload CSV (Preview)</title></head>
<body>
  <h3>CSV 업로드 (원본 보관 + 첫 100행 DB 삽입)</h3>
  <input id="file" type="file" accept=".csv,.txt" />
  <button id="send">업로드</button>
  <pre id="result"></pre>
<script>
document.getElementById('send').onclick = async () => {
  const f = document.getElementById('file').files[0];
  if(!f){ alert('파일 선택'); return; }
  const fd = new FormData();
  fd.append('file', f);
  const resEl = document.getElementById('result');
  resEl.textContent = '업로드 중...';
  try{
    const r = await fetch('/api/upload-and-preview', { method:'POST', body: fd });
    const j = await r.json();
    if(!r.ok) throw j;
    resEl.textContent = JSON.stringify(j, null, 2);
  }catch(e){
    resEl.textContent = '오류: ' + (e?.error || e?.message || JSON.stringify(e));
  }
};
</script>
</body>
</html>
